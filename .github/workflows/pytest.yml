name: Pytest
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libportaudio2 libcairo2-dev libgirepository1.0-dev python3-gi python3-gi-cairo gstreamer1.0-plugins-base gstreamer1.0-plugins-good gir1.2-gst-plugins-base-1.0
          version: 1.0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12
          enable-cache: true
      - name: Install the project
        run: uv sync --frozen --all-extras --group dev
      - name: Install gstreamer Python bindings (macOS)
        if: matrix.os == 'macos-latest'
        run: uv pip install --upgrade --index-url https://gitlab.freedesktop.org/api/v4/projects/1340/packages/pypi/simple gstreamer==1.28.0
      - name: Run tests
        run: |
          uv run pytest -vv -m 'not audio and not video and not audio_sounddevice and not video_opencv and not wireless' --tb=short
        env:
          MUJOCO_GL: disable
