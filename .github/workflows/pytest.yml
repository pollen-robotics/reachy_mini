name: Pytest
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libcairo2-dev libgirepository1.0-dev python3-gi python3-gi-cairo gstreamer1.0-plugins-base gstreamer1.0-plugins-good gir1.2-gst-plugins-base-1.0
          version: 1.0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12
          enable-cache: true
      - name: Install the project
        run: uv sync --frozen --all-extras --group dev
      - name: Run tests
        run: |
          uv run pytest -vv -m 'not audio and not video and not wireless and not ipc_resolution' --tb=short
        env:
          MUJOCO_GL: disable
