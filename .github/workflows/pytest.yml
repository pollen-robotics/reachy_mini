name: Pytest
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true
      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/install-system-deps
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: 3.12
          enable-cache: true
      - name: Install the project
        run: uv sync --frozen --all-extras --group dev
      - name: Run tests
        run: |
          uv run pytest -vv -m 'not audio and not video and not wireless and not webrtc' --tb=short
        env:
          MUJOCO_GL: disable
      # Virtual audio card (PulseAudio null sink + ALSA `type pulse` .asoundrc)
      # so the tests exercise the real alsasrc/alsasink fast-path
      # (has_reachymini_asoundrc); the null sink's monitor loops playback back to
      # capture for the play-through test. Video needs no device: the
      # ipc_video_source fixture feeds videotestsrc -> unixfdsink into the IPC
      # socket GStreamerCamera reads. Board/wireless tests stay excluded.
      # Ubuntu only.
      - name: Set up virtual sound card (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/virtual-sound-card
      - name: Run audio + video tests (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pytest -vv tests/unit_tests/test_audio.py tests/unit_tests/test_video.py \
            -m '(audio or video) and not respeaker and not wireless' --tb=short
        env:
          MUJOCO_GL: disable
      # Real WebRTC: the prebuilt gst-plugins-rs webrtc plugin gives us
      # webrtcsrc/webrtcsink, so GstWebRTCClient and GstMediaServer construct
      # and a gst-launch webrtcsink producer loops back to the client. Pure
      # userspace (no robot). Ubuntu only. See tests/unit_tests/test_webrtc_*.
      - name: Set up gst-plugins-rs webrtc plugin (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/webrtc-plugin
      - name: Run WebRTC tests (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # `-m webrtc` explicitly selects these, so a missing plugin fails
          # loudly (see conftest.pytest_collection_modifyitems) rather than
          # silently skipping — this job set the plugin up.
          uv run pytest -vv -m 'webrtc and not wireless' --tb=short
        env:
          MUJOCO_GL: disable
