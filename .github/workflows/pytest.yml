name: Pytest
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libcairo2-dev libgirepository1.0-dev python3-gi python3-gi-cairo gir1.2-gst-1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-toolsreamer1.0-plugins-good gstreamer1.0-tools
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12
      - name: Install the project
        run: uv sync --frozen --all-extras
      - name: Run tests
        run: |
          uv run pytest -vv -m 'not audio and not video and not audio_sounddevice and not video_opencv and not wireless' --tb=short
        env:
          MUJOCO_GL: disable
