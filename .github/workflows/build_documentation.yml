name: Build HF documentation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.4.0) - Leave empty for standard main build"
        required: false
        type: string

  release:
    types:
      - published

  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "examples/**"

jobs:
  build:
    # Pinned to last-known-good upstream SHA. Commit 9ad2de8582 (2026-04-15)
    # regressed the "Push to dataset" step by dropping `shell: bash`, causing
    # `source: not found` under the custom container's default `sh`. Bump back
    # to @main once upstream restores the shell declaration.
    uses: huggingface/doc-builder/.github/workflows/build_main_documentation.yml@9a1ab9c87b
    with:
      repo_owner: pollen-robotics
      commit_sha: ${{ github.sha }}
      package: reachy_mini
      custom_container: pollenrobotics/reachymini_documentation
      additional_args: >-
        ${{
          (github.event_name == 'release' && format('--version {0}', github.event.release.tag_name)) ||
          (inputs.version != '' && format('--version {0}', inputs.version)) ||
          ''
        }}
    secrets:
      token: ${{ secrets.HUGGINGFACE_PUSH }}
      hf_token: ${{ secrets.HF_DOC_BUILD_PUSH }}
