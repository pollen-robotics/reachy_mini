name: Publish npm

on:
  release:
    types:
      - created
  push:
    branches:
      - main
    paths:
      - "ts/**"
      - ".github/workflows/npm-publish.yml"
  pull_request:
    paths:
      - "ts/**"
      - ".github/workflows/npm-publish.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC)
    defaults:
      run:
        working-directory: ts
    steps:
      # `lfs: true` is required so Vite inlines the real binary content
      # of host SVG/PNG assets (tracked via .gitattributes) instead of
      # 130-byte LFS pointer text. Without it, the published bundle ends
      # up containing `data:image/svg+xml,version https://git-lfs...`
      # placeholders which render as broken images in consumer apps.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"   # ships npm >= 11.5.1 — required for trusted publishing
          registry-url: "https://registry.npmjs.org"

      # Install deps for the single npm package
      # (@pollen-robotics/reachy-mini-sdk). The SDK runtime lives at
      # ts/reachy-mini-sdk.ts (+ ts/lib/*.ts) and is compiled to
      # ts/dist/ by `npm run build:sdk`. The optional host shell lives
      # under ts/host/ and is bundled by `npm run build:host` into
      # ts/host/dist/, surfaced via the `./host*` subpath exports.
      - name: Install package dependencies
        run: npm ci

      # Build the SDK dist/ + host bundles into host/dist/. Required
      # for the `.`, `./host`, `./host/auto`, `./host/embed`, and
      # `./host/protocol` subpath exports to resolve in the published
      # tarball.
      - name: Build SDK and host bundles
        run: npm run build

      # Guard against silently shipping a tarball where Vite has inlined
      # LFS pointer text in place of the real binary assets (see
      # `lfs: true` note on checkout). Fails the job loudly so the bug
      # cannot regress unnoticed.
      - name: Verify bundles contain no LFS pointers
        run: |
          if grep -RIn --binary-files=text 'git-lfs.github.com/spec' \
              host/dist dist 2>/dev/null; then
            echo "::error::LFS pointer text leaked into built bundles. Did checkout run without lfs: true?"
            exit 1
          fi

      # pyproject.toml is the single source of truth for the version.
      # Release (stable X.Y.Z)  → publish <py_ver>            on `latest`.
      # Release (prerelease)    → publish <py_ver>            on `rc`
      #                           (npm refuses prereleases on `latest`).
      # Push to main            → publish <py_ver>-main.<sha> on `main`.
      # Pull request            → dry-run only (no publish).
      - name: Compute and apply version from pyproject.toml
        id: ver
        run: |
          py_ver=$(grep -E '^version' ../pyproject.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')
          # pyproject.toml uses PEP 440 (e.g. 1.10.0.dev0, 1.9.0rc1); npm
          # requires semver. Normalize the prerelease/dev suffix into a
          # single dot-separated semver prerelease before `npm version`:
          #   1.10.0.dev0    -> 1.10.0-dev.0
          #   1.9.0rc1       -> 1.9.0-rc.1
          #   1.9.0rc1.dev0  -> 1.9.0-rc.1.dev.0
          #   1.10.0         -> 1.10.0 (unchanged)
          semver=$(python3 - "$py_ver" <<'PY'
          import re, sys
          v = sys.argv[1]
          m = re.match(r'^(\d+\.\d+\.\d+)(?:(a|b|rc)(\d+))?(?:\.dev(\d+))?$', v)
          if not m:
              print(v); sys.exit(0)
          base, pre, pren, dev = m.groups()
          parts = []
          if pre:
              parts += [pre, pren]
          if dev is not None:
              parts += ['dev', dev]
          print(base + ('-' + '.'.join(parts) if parts else ''))
          PY
          )
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            sha=$(echo "${{ github.sha }}" | cut -c1-7)
            # semver permits only one '-': when the normalized version
            # already carries a prerelease, append the build marker as
            # extra dot-separated identifiers instead of a second '-'.
            if [[ "$semver" == *-* ]]; then
              ver="${semver}.main.${sha}"
            else
              ver="${semver}-main.${sha}"
            fi
          else
            ver="${semver}"
          fi
          if [[ "$py_ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            release_tag="latest"
          else
            release_tag="rc"
          fi
          echo "Computed version: $ver (event=${{ github.event_name }}, release_tag=$release_tag)"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          npm version "$ver" --no-git-tag-version

      # PR: pack to confirm the publish would succeed (tarball
      # layout, manifest validity, no missing files) without
      # actually publishing.
      - name: Verify tarball (PR dry-run)
        if: github.event_name == 'pull_request'
        run: npm pack --dry-run

      - name: Publish (release)
        if: github.event_name == 'release'
        run: npm publish --tag "${{ steps.ver.outputs.release_tag }}"

      - name: Publish (main)
        if: github.event_name == 'push'
        run: npm publish --tag main
