  mac_sim:
    runs-on: ci-runner-mac
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: |
          rm -rf .venv
          python3.12 -m venv .venv

      - name: Install dependencies with MuJoCo
        run: |
          source .venv/bin/activate
          which python
          : > install.log
          python3.12 -m pip install --upgrade pip 2>&1 | tee -a install.log
          pip install --force-reinstall "reachy_mini[mujoco] @ git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | tee -a install.log

