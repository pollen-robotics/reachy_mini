name: Reachy Mini Physical CI

on:
  workflow_dispatch:

jobs:
  linux_wireless:
    runs-on: ci-runner-linux
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: python3 -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          : > install.log
          python3 -m pip install --upgrade pip 2>&1 | tee -a install.log
          pip install --force-reinstall git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467 2>&1 | tee -a install.log

      - name: Start Reachy Mini Wireless daemon
        run: |
          echo "Starting Reachy Mini Wireless daemon..."
          curl -X POST "http://reachy-mini-ci.local:8000/api/daemon/start?wake_up=true" || echo "Daemon may already be running"

      - name: Wait for Wireless daemon to be running
        run: |
          echo "Waiting for Wireless daemon to start..."
          for i in {1..20}; do
            STATUS=$(curl -s http://reachy-mini-ci.local:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Wireless daemon is now running!"
              exit 0
            fi
            sleep 3
          done
          echo "[ERROR] Wireless daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Wireless daemon
        if: always()
        run: |
          echo "Stopping Wireless daemon..."
          curl -X POST "http://reachy-mini-ci.local:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon"

      - name: Write step summary
        if: always()
        run: |
          STATUS="✓"
          [ "${{ job.status }}" != "success" ] && STATUS="✗"
          {
            echo ""
            echo "<details><summary>linux_wireless $STATUS</summary>"
            echo ""
            echo "**Install log**"
            echo ""
            echo '```'
            cat install.log 2>/dev/null || echo "(no install log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup virtual environment
        if: always()
        run: rm -rf .venv

  linux_lite:
    needs: linux_wireless
    if: always()
    runs-on: ci-runner-linux
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: python3 -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          : > install.log
          python3 -m pip install --upgrade pip 2>&1 | tee -a install.log
          pip install --force-reinstall git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467 2>&1 | tee -a install.log

      - name: Start Reachy Mini Lite daemon
        run: |
          echo "Starting Reachy Mini Lite daemon..."
          source .venv/bin/activate
          reachy-mini-daemon --robot-name reachy_mini_lite --serialport auto --localhost-only > daemon.log 2>&1 &
          echo $! > lite_daemon.pid
          echo "Daemon PID: $(cat lite_daemon.pid)"

      - name: Wait for Lite daemon to be running
        run: |
          echo "Waiting for Lite daemon to start..."
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Lite daemon is now running!"
              exit 0
            fi
            sleep 3
          done
          echo "[ERROR] Lite daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Lite daemon
        if: always()
        run: |
          echo "Stopping Lite daemon..."
          curl -X POST "http://localhost:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon via API"
          sleep 2
          if [ -f lite_daemon.pid ]; then
            kill $(cat lite_daemon.pid) 2>/dev/null || echo "Daemon already stopped"
            rm lite_daemon.pid
          fi

      - name: Write step summary
        if: always()
        run: |
          STATUS="✓"
          [ "${{ job.status }}" != "success" ] && STATUS="✗"
          {
            echo ""
            echo "<details><summary>linux_lite $STATUS</summary>"
            echo ""
            echo "**Install log**"
            echo ""
            echo '```'
            cat install.log 2>/dev/null || echo "(no install log)"
            echo '```'
            echo ""
            echo "**Daemon log**"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup virtual environment
        if: always()
        run: rm -rf .venv

  linux_sim:
    needs: linux_lite
    if: always()
    runs-on: ci-runner-linux
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: python3 -m venv .venv

      - name: Install dependencies with MuJoCo
        run: |
          source .venv/bin/activate
          : > install.log
          python3 -m pip install --upgrade pip 2>&1 | tee -a install.log
          pip install --force-reinstall "reachy_mini[mujoco] @ git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | tee -a install.log

      - name: Start Reachy Mini Simulation daemon
        run: |
          echo "Starting Reachy Mini Simulation daemon..."
          source .venv/bin/activate
          reachy-mini-daemon --robot-name reachy_mini_sim --sim --headless --localhost-only > daemon.log 2>&1 &
          echo $! > sim_daemon.pid
          echo "Daemon PID: $(cat sim_daemon.pid)"

      - name: Wait for Simulation daemon to be running
        run: |
          echo "Waiting for Simulation daemon to start..."
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Simulation daemon is now running!"
              exit 0
            fi
            sleep 3
          done
          echo "[ERROR] Simulation daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Simulation daemon
        if: always()
        run: |
          echo "Stopping Simulation daemon..."
          curl -X POST "http://localhost:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon via API"
          sleep 2
          if [ -f sim_daemon.pid ]; then
            kill $(cat sim_daemon.pid) 2>/dev/null || echo "Daemon already stopped"
            rm sim_daemon.pid
          fi

      - name: Write step summary
        if: always()
        run: |
          STATUS="✓"
          [ "${{ job.status }}" != "success" ] && STATUS="✗"
          {
            echo ""
            echo "<details><summary>linux_sim $STATUS</summary>"
            echo ""
            echo "**Install log**"
            echo ""
            echo '```'
            cat install.log 2>/dev/null || echo "(no install log)"
            echo '```'
            echo ""
            echo "**Daemon log**"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup virtual environment
        if: always()
        run: rm -rf .venv

  windows_lite:
    runs-on: ci-runner-windows
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cleanup any existing daemon process
        shell: powershell
        run: |
          Write-Host "Checking for existing daemon processes..."
          Get-Process | Where-Object {$_.ProcessName -like "*reachy*"} | ForEach-Object {
            Write-Host "Killing existing process: $($_.ProcessName) (PID: $($_.Id))"
            Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
          }
          Write-Host "Cleanup complete"

      - name: Create virtual environment
        shell: powershell
        run: python -m venv .venv

      - name: Install dependencies
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          .venv\Scripts\Activate.ps1
          "" | Out-File -FilePath install.log -Encoding utf8
          python -m pip install --upgrade pip 2>&1 | Tee-Object -FilePath install.log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install --force-reinstall "git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | Tee-Object -FilePath install.log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Start Reachy Mini Lite daemon
        shell: powershell
        run: |
          Write-Host "Starting Reachy Mini Lite daemon with detached process..."
          .venv\Scripts\Activate.ps1
          cmd /c "start /B .venv\Scripts\reachy-mini-daemon.exe --robot-name reachy_mini_lite --serialport auto --localhost-only > daemon.log 2>&1"
          Start-Sleep -Seconds 5
          Write-Host "Finding daemon PID..."
          $process = Get-Process | Where-Object {$_.ProcessName -eq "reachy-mini-daemon"} | Select-Object -First 1
          if ($process) {
            $process.Id | Out-File -FilePath lite_daemon.pid
            Write-Host "Daemon PID: $($process.Id)"
          } else {
            Write-Host "[ERROR] Could not find daemon process"
            exit 1
          }

      - name: Wait for Lite daemon to be running
        shell: powershell
        run: |
          Write-Host "Waiting for Lite daemon to start..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8000/api/daemon/status" -Method Get
              $status = $response.state
              Write-Host "Attempt $i : Daemon status is '$status'"
              if ($status -eq "running") {
                Write-Host "[OK] Lite daemon is now running!"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i : Failed to get status"
            }
            Start-Sleep -Seconds 5
          }
          Write-Host "[ERROR] Lite daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Lite daemon
        if: always()
        shell: powershell
        run: |
          Write-Host "Stopping Lite daemon via API..."
          curl.exe -X POST "http://127.0.0.1:8000/api/daemon/stop?goto_sleep=true"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "API stop successful"
          } else {
            Write-Host "API stop failed, will force kill"
          }
          Start-Sleep -Seconds 3
          if (Test-Path lite_daemon.pid) {
            $daemonPid = Get-Content lite_daemon.pid
            Write-Host "Killing process PID: $daemonPid"
            Stop-Process -Id $daemonPid -Force -ErrorAction SilentlyContinue
            Remove-Item lite_daemon.pid
            Write-Host "Process stopped and PID file removed"
          } else {
            Write-Host "No PID file found"
          }
          $global:LASTEXITCODE = 0

      - name: Write step summary
        if: always()
        shell: powershell
        run: |
          $check = [char]0x2713
          $cross = [char]0x2717
          $status = if ('${{ job.status }}' -eq 'success') { $check } else { $cross }
          $p = $env:GITHUB_STEP_SUMMARY
          "" | Add-Content -Path $p -Encoding utf8
          "<details><summary>windows_lite $status</summary>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "**Install log**" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path install.log) { Get-Content install.log | Add-Content -Path $p -Encoding utf8 } else { "(no install log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "**Daemon log**" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path daemon.log) { Get-Content daemon.log | Add-Content -Path $p -Encoding utf8 } else { "(no daemon log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "</details>" | Add-Content -Path $p -Encoding utf8

      - name: Cleanup virtual environment
        if: always()
        shell: powershell
        run: Remove-Item -Recurse -Force .venv -ErrorAction SilentlyContinue

  windows_wireless:
    needs: [linux_wireless, windows_lite]
    if: always()
    runs-on: ci-runner-windows
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        shell: powershell
        run: python -m venv .venv

      - name: Install dependencies
