name: Reachy Mini Physical CI

on:
  workflow_dispatch:

jobs:
  wireless_update:
    runs-on: ci-runner-linux
    timeout-minutes: 10
    env:
      UPDATE_REF: 10de4b99a96d706ac421809fd9402f2eeb02d467
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate update ref on GitHub
        run: |
          echo "Validating ref $UPDATE_REF..."
          RESPONSE=$(curl -s "http://reachy-mini-ci.local:8000/update/validate-ref?git_ref=$UPDATE_REF")
          echo "Response: $RESPONSE"
          VALID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('valid'))")
          if [ "$VALID" != "True" ]; then
            echo "[ERROR] Ref $UPDATE_REF not found on GitHub"
            exit 1
          fi
          echo "[OK] Ref $UPDATE_REF is valid"

      - name: Show current robot install
        run: |
          echo "Current robot install:"
          curl -s "http://reachy-mini-ci.local:8000/update/install-source"
          echo ""

      - name: Trigger update
        run: |
          echo "Triggering update to $UPDATE_REF..."
          RESPONSE=$(curl -sX POST "http://reachy-mini-ci.local:8000/update/start-from-ref?git_ref=$UPDATE_REF")
          echo "Trigger response: $RESPONSE"

      - name: Wait until robot is on target ref
        run: |
          SHORT_REF=$(echo "$UPDATE_REF" | cut -c1-8)
          echo "Polling install-source until commit == $SHORT_REF (max 5min)..."
          for i in {1..60}; do
            INFO=$(curl -s --max-time 10 "http://reachy-mini-ci.local:8000/update/install-source" 2>/dev/null || echo "")
            COMMIT=$(echo "$INFO" | python3 -c "import sys, json; print(json.load(sys.stdin).get('commit', ''))" 2>/dev/null || echo "")
            echo "Attempt $i: commit=$COMMIT (full: $INFO)"
            if [ "$COMMIT" = "$SHORT_REF" ]; then
              echo "[OK] Robot is on $UPDATE_REF"
              exit 0
            fi
            sleep 5
          done
          echo "[ERROR] Robot did not reach $UPDATE_REF after 5min"
          exit 1

  linux_wireless:
    needs: wireless_update
    runs-on: ci-runner-linux
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Start Reachy Mini Wireless daemon
        run: |
          echo "Starting Reachy Mini Wireless daemon..."
          curl -X POST "http://reachy-mini-ci.local:8000/api/daemon/start?wake_up=true" || echo "Daemon may already be running"

      - name: Wait for Wireless daemon to be running
        run: |
          echo "Waiting for Wireless daemon to start..."
          for i in {1..20}; do
            STATUS=$(curl -s http://reachy-mini-ci.local:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Wireless daemon is now running!"
              exit 0
            fi
            sleep 3
          done
          echo "[ERROR] Wireless daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Wireless daemon
        if: always()
        run: |
          echo "Stopping Wireless daemon..."
          curl -X POST "http://reachy-mini-ci.local:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon"

      - name: Fetch daemon logs via WebSocket
        if: always()
        run: |
          sleep 5
          python3 -m venv /tmp/ws-venv
          /tmp/ws-venv/bin/pip install --quiet websockets
          /tmp/ws-venv/bin/python - > daemon.log <<'PYEOF'
          import asyncio, websockets
          async def main():
              uri = "ws://reachy-mini-ci.local:8000/logs/ws/daemon"
              print(f"[CI] Connecting to {uri}", flush=True)
              try:
                  async with websockets.connect(uri, open_timeout=30, ping_interval=None) as ws:
                      print("[CI] WS connected, reading messages...", flush=True)
                      while True:
                          try:
                              msg = await asyncio.wait_for(ws.recv(), timeout=3.0)
                              if msg.strip():
                                  print(msg, flush=True)
                          except asyncio.TimeoutError:
                              break
                          except websockets.exceptions.ConnectionClosed:
                              break
              except Exception as e:
                  print(f"[CI] Failed to fetch logs: {type(e).__name__}: {e}", flush=True)
          asyncio.run(main())
          PYEOF
          echo "Fetched $(wc -l < daemon.log) lines"
          rm -rf /tmp/ws-venv

      - name: Write step summary
        if: always()
        run: |
          {
            echo ""
            echo "<details><summary>Daemon log</summary>"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  linux_lite:
    needs: linux_wireless
    if: always()
    runs-on: ci-runner-linux
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: python3 -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          : > install.log
          python3 -m pip install --upgrade pip 2>&1 | tee -a install.log
          pip install --force-reinstall git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467 2>&1 | tee -a install.log

      - name: Start Reachy Mini Lite daemon
        run: |
          echo "Starting Reachy Mini Lite daemon..."
          source .venv/bin/activate
          reachy-mini-daemon --robot-name reachy_mini_lite --serialport auto --localhost-only > daemon.log 2>&1 &
          echo $! > lite_daemon.pid
          echo "Daemon PID: $(cat lite_daemon.pid)"

      - name: Wait for Lite daemon to be running
        run: |
          echo "Waiting for Lite daemon to start..."
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Lite daemon is now running!"
              exit 0
            fi
            sleep 3
          done
          echo "[ERROR] Lite daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Lite daemon
        if: always()
        run: |
          echo "Stopping Lite daemon..."
          curl -X POST "http://localhost:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon via API"
          sleep 2
          if [ -f lite_daemon.pid ]; then
            kill $(cat lite_daemon.pid) 2>/dev/null || echo "Daemon already stopped"
            rm lite_daemon.pid
          fi

      - name: Write step summary
        if: always()
        run: |
          {
            echo ""
            echo "<details><summary>Install log</summary>"
            echo ""
            echo '```'
            cat install.log 2>/dev/null || echo "(no install log)"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>Daemon log</summary>"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup virtual environment
        if: always()
        run: rm -rf .venv

  linux_sim:
    needs: linux_lite
    if: always()
    runs-on: ci-runner-linux
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: python3 -m venv .venv

      - name: Install dependencies with MuJoCo
        run: |
          source .venv/bin/activate
          : > install.log
          python3 -m pip install --upgrade pip 2>&1 | tee -a install.log
          pip install --force-reinstall "reachy_mini[mujoco] @ git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | tee -a install.log

      - name: Start Reachy Mini Simulation daemon
        run: |
          echo "Starting Reachy Mini Simulation daemon..."
          source .venv/bin/activate
          reachy-mini-daemon --robot-name reachy_mini_sim --sim --headless --localhost-only > daemon.log 2>&1 &
          echo $! > sim_daemon.pid
          echo "Daemon PID: $(cat sim_daemon.pid)"

      - name: Wait for Simulation daemon to be running
        run: |
          echo "Waiting for Simulation daemon to start..."
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Simulation daemon is now running!"
              exit 0
            fi
            sleep 3
          done
          echo "[ERROR] Simulation daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Simulation daemon
        if: always()
        run: |
          echo "Stopping Simulation daemon..."
          curl -X POST "http://localhost:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon via API"
          sleep 2
          if [ -f sim_daemon.pid ]; then
            kill $(cat sim_daemon.pid) 2>/dev/null || echo "Daemon already stopped"
            rm sim_daemon.pid
          fi

      - name: Write step summary
        if: always()
        run: |
          {
            echo ""
            echo "<details><summary>Install log</summary>"
            echo ""
            echo '```'
            cat install.log 2>/dev/null || echo "(no install log)"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>Daemon log</summary>"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup virtual environment
        if: always()
        run: rm -rf .venv

  windows_lite:
    runs-on: ci-runner-windows
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cleanup any existing daemon process
        shell: powershell
        run: |
          Write-Host "Checking for existing daemon processes..."
          Get-Process | Where-Object {$_.ProcessName -like "*reachy*"} | ForEach-Object {
            Write-Host "Killing existing process: $($_.ProcessName) (PID: $($_.Id))"
            Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
          }
          Write-Host "Cleanup complete"

      - name: Create virtual environment
        shell: powershell
        run: python -m venv .venv

      - name: Install dependencies
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          .venv\Scripts\Activate.ps1
          "" | Out-File -FilePath install.log -Encoding utf8
          python -m pip install --upgrade pip 2>&1 | ForEach-Object {
            Write-Host $_
            Add-Content -Path install.log -Value "$_" -Encoding utf8
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install --force-reinstall "git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | ForEach-Object {
            Write-Host $_
            Add-Content -Path install.log -Value "$_" -Encoding utf8
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Start Reachy Mini Lite daemon
        shell: powershell
        run: |
          Write-Host "Starting Reachy Mini Lite daemon with detached process..."
          .venv\Scripts\Activate.ps1
          cmd /c "start /B .venv\Scripts\reachy-mini-daemon.exe --robot-name reachy_mini_lite --serialport auto --localhost-only > daemon.log 2>&1"
          Start-Sleep -Seconds 5
          Write-Host "Finding daemon PID..."
          $process = Get-Process | Where-Object {$_.ProcessName -eq "reachy-mini-daemon"} | Select-Object -First 1
          if ($process) {
            $process.Id | Out-File -FilePath lite_daemon.pid
            Write-Host "Daemon PID: $($process.Id)"
          } else {
            Write-Host "[ERROR] Could not find daemon process"
            exit 1
          }

      - name: Wait for Lite daemon to be running
        shell: powershell
        run: |
          Write-Host "Waiting for Lite daemon to start..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8000/api/daemon/status" -Method Get
              $status = $response.state
              Write-Host "Attempt $i : Daemon status is '$status'"
              if ($status -eq "running") {
                Write-Host "[OK] Lite daemon is now running!"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i : Failed to get status"
            }
            Start-Sleep -Seconds 5
          }
          Write-Host "[ERROR] Lite daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Lite daemon
        if: always()
        shell: powershell
        run: |
          Write-Host "Stopping Lite daemon via API..."
          curl.exe -X POST "http://127.0.0.1:8000/api/daemon/stop?goto_sleep=true"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "API stop successful"
          } else {
            Write-Host "API stop failed, will force kill"
          }
          Start-Sleep -Seconds 3
          if (Test-Path lite_daemon.pid) {
            $daemonPid = Get-Content lite_daemon.pid
            Write-Host "Killing process PID: $daemonPid"
            Stop-Process -Id $daemonPid -Force -ErrorAction SilentlyContinue
            Remove-Item lite_daemon.pid
            Write-Host "Process stopped and PID file removed"
          } else {
            Write-Host "No PID file found"
          }
          $global:LASTEXITCODE = 0

      - name: Write step summary
        if: always()
        shell: powershell
        run: |
          $p = $env:GITHUB_STEP_SUMMARY
          "" | Add-Content -Path $p -Encoding utf8
          "<details><summary>Install log</summary>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path install.log) { Get-Content install.log | Add-Content -Path $p -Encoding utf8 } else { "(no install log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "</details>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "<details><summary>Daemon log</summary>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path daemon.log) { Get-Content daemon.log | Add-Content -Path $p -Encoding utf8 } else { "(no daemon log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "</details>" | Add-Content -Path $p -Encoding utf8

      - name: Cleanup virtual environment
        if: always()
        shell: powershell
        run: Remove-Item -Recurse -Force .venv -ErrorAction SilentlyContinue

  windows_wireless:
    needs: [linux_wireless, windows_lite]
    if: ${{ always() && needs.linux_wireless.result == 'success' }}
    runs-on: ci-runner-windows
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Start Reachy Mini Wireless daemon
        shell: powershell
        run: |
          Write-Host "Starting Reachy Mini Wireless daemon..."
          curl.exe -X POST "http://reachy-mini-ci.local:8000/api/daemon/start?wake_up=true"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Daemon may already be running"
          }
          $global:LASTEXITCODE = 0

      - name: Wait for Wireless daemon to be running
        shell: powershell
        run: |
          Write-Host "Waiting for Wireless daemon to start..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://reachy-mini-ci.local:8000/api/daemon/status" -Method Get
              $status = $response.state
              Write-Host "Attempt $i : Daemon status is '$status'"
              if ($status -eq "running") {
                Write-Host "[OK] Wireless daemon is now running!"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i : Failed to get status"
            }
            Start-Sleep -Seconds 5
          }
          Write-Host "[ERROR] Wireless daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Wireless daemon
        if: always()
        shell: powershell
        run: |
          Write-Host "Stopping Wireless daemon..."
          curl.exe -X POST "http://reachy-mini-ci.local:8000/api/daemon/stop?goto_sleep=true"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Failed to stop daemon"
          }
          $global:LASTEXITCODE = 0

      - name: Fetch daemon logs via WebSocket
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          Start-Sleep -Seconds 5
          python -m venv $env:TEMP\ws-venv
          & "$env:TEMP\ws-venv\Scripts\python.exe" -m pip install --quiet websockets
          $script = @'
          import asyncio, websockets
          async def main():
              uri = "ws://reachy-mini-ci.local:8000/logs/ws/daemon"
              print(f"[CI] Connecting to {uri}", flush=True)
              try:
                  async with websockets.connect(uri, open_timeout=30, ping_interval=None) as ws:
                      print("[CI] WS connected, reading messages...", flush=True)
                      while True:
                          try:
                              msg = await asyncio.wait_for(ws.recv(), timeout=3.0)
                              if msg.strip():
                                  print(msg, flush=True)
                          except asyncio.TimeoutError:
                              break
                          except websockets.exceptions.ConnectionClosed:
                              break
              except Exception as e:
                  print(f"[CI] Failed to fetch logs: {type(e).__name__}: {e}", flush=True)
          asyncio.run(main())
          '@
          $scriptPath = "$env:TEMP\fetch_logs.py"
          $script | Out-File -FilePath $scriptPath -Encoding utf8
          & "$env:TEMP\ws-venv\Scripts\python.exe" $scriptPath | Out-File -FilePath daemon.log -Encoding utf8
          if (Test-Path daemon.log) {
            Write-Host "Fetched $((Get-Content daemon.log).Count) lines"
          }
          Remove-Item -Recurse -Force $env:TEMP\ws-venv -ErrorAction SilentlyContinue
          Remove-Item -Force $scriptPath -ErrorAction SilentlyContinue

      - name: Write step summary
        if: always()
        shell: powershell
        run: |
          $p = $env:GITHUB_STEP_SUMMARY
          "" | Add-Content -Path $p -Encoding utf8
          "<details><summary>Daemon log</summary>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path daemon.log) { Get-Content daemon.log | Add-Content -Path $p -Encoding utf8 } else { "(no daemon log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "</details>" | Add-Content -Path $p -Encoding utf8

  windows_sim:
    needs: windows_wireless
    if: always()
    runs-on: ci-runner-windows
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cleanup any existing daemon process
        shell: powershell
        run: |
          Write-Host "Checking for existing daemon processes..."
          Get-Process | Where-Object {$_.ProcessName -like "*reachy*"} | ForEach-Object {
            Write-Host "Killing existing process: $($_.ProcessName) (PID: $($_.Id))"
            Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue
          }
          Write-Host "Cleanup complete"

      - name: Create virtual environment
        shell: powershell
        run: python -m venv .venv

      - name: Install dependencies with MuJoCo
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          .venv\Scripts\Activate.ps1
          "" | Out-File -FilePath install.log -Encoding utf8
          python -m pip install --upgrade pip 2>&1 | ForEach-Object {
            Write-Host $_
            Add-Content -Path install.log -Value "$_" -Encoding utf8
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install --force-reinstall "reachy_mini[mujoco] @ git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | ForEach-Object {
            Write-Host $_
            Add-Content -Path install.log -Value "$_" -Encoding utf8
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Start Reachy Mini Simulation daemon
        shell: powershell
        run: |
          Write-Host "Starting Reachy Mini Simulation daemon with detached process..."
          .venv\Scripts\Activate.ps1
          cmd /c "start /B .venv\Scripts\reachy-mini-daemon.exe --robot-name reachy_mini_sim --sim --headless --localhost-only > daemon.log 2>&1"
          Start-Sleep -Seconds 5
          Write-Host "Finding daemon PID..."
          $process = Get-Process | Where-Object {$_.ProcessName -eq "reachy-mini-daemon"} | Select-Object -First 1
          if ($process) {
            $process.Id | Out-File -FilePath sim_daemon.pid
            Write-Host "Daemon PID: $($process.Id)"
          } else {
            Write-Host "[ERROR] Could not find daemon process"
            exit 1
          }

      - name: Wait for Simulation daemon to be running
        shell: powershell
        run: |
          Write-Host "Waiting for Simulation daemon to start..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8000/api/daemon/status" -Method Get
              $status = $response.state
              Write-Host "Attempt $i : Daemon status is '$status'"
              if ($status -eq "running") {
                Write-Host "[OK] Simulation daemon is now running!"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i : Failed to get status"
            }
            Start-Sleep -Seconds 5
          }
          Write-Host "[ERROR] Simulation daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Simulation daemon
        if: always()
        shell: powershell
        run: |
          Write-Host "Stopping Simulation daemon via API..."
          curl.exe -X POST "http://127.0.0.1:8000/api/daemon/stop?goto_sleep=true"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "API stop successful"
          } else {
            Write-Host "API stop failed, will force kill"
          }
          Start-Sleep -Seconds 3
          if (Test-Path sim_daemon.pid) {
            $daemonPid = Get-Content sim_daemon.pid
            Write-Host "Killing process PID: $daemonPid"
            Stop-Process -Id $daemonPid -Force -ErrorAction SilentlyContinue
            Remove-Item sim_daemon.pid
            Write-Host "Process stopped and PID file removed"
          } else {
            Write-Host "No PID file found"
          }
          $global:LASTEXITCODE = 0

      - name: Write step summary
        if: always()
        shell: powershell
        run: |
          $p = $env:GITHUB_STEP_SUMMARY
          "" | Add-Content -Path $p -Encoding utf8
          "<details><summary>Install log</summary>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path install.log) { Get-Content install.log | Add-Content -Path $p -Encoding utf8 } else { "(no install log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "</details>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "<details><summary>Daemon log</summary>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path daemon.log) { Get-Content daemon.log | Add-Content -Path $p -Encoding utf8 } else { "(no daemon log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "</details>" | Add-Content -Path $p -Encoding utf8

      - name: Cleanup virtual environment
        if: always()
        shell: powershell
        run: |
          Write-Host "Cleaning up virtual environment..."
          Remove-Item -Recurse -Force .venv -ErrorAction SilentlyContinue
          Write-Host "Cleanup complete"

  mac_sim:
    runs-on: ci-runner-mac
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: |
          rm -rf .venv
          python3.12 -m venv .venv

      - name: Install dependencies with MuJoCo
        run: |
          source .venv/bin/activate
          which python
          : > install.log
          python3.12 -m pip install --upgrade pip 2>&1 | tee -a install.log
          pip install --force-reinstall "reachy_mini[mujoco] @ git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | tee -a install.log

      - name: Start Reachy Mini Simulation daemon
        run: |
          echo "Starting Reachy Mini Simulation daemon..."
          source .venv/bin/activate
          reachy-mini-daemon --robot-name reachy_mini_sim --sim --headless --localhost-only > daemon.log 2>&1 &
          echo $! > sim_daemon.pid
          echo "Daemon PID: $(cat sim_daemon.pid)"

      - name: Wait for Simulation daemon to be running
        run: |
          echo "Waiting for Simulation daemon to start..."
          for i in {1..60}; do
            STATUS=$(curl -s http://localhost:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Simulation daemon is now running!"
              exit 0
            fi
            sleep 5
          done
          echo "[ERROR] Simulation daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Simulation daemon
        if: always()
        run: |
          echo "Stopping Simulation daemon..."
          curl -X POST "http://localhost:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon via API"
          sleep 2
          if [ -f sim_daemon.pid ]; then
            kill $(cat sim_daemon.pid) 2>/dev/null || echo "Daemon already stopped"
            rm sim_daemon.pid
          fi

      - name: Write step summary
        if: always()
        run: |
          {
            echo ""
            echo "<details><summary>Install log</summary>"
            echo ""
            echo '```'
            cat install.log 2>/dev/null || echo "(no install log)"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>Daemon log</summary>"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      # - name: Cleanup virtual environment
      #   if: always()
      #   run: rm -rf .venv

  mac_lite:
    needs: mac_sim
    if: always()
    runs-on: ci-runner-mac
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create virtual environment
        run: python3.12 -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          : > install.log
          python3.12 -m pip install --upgrade pip 2>&1 | tee -a install.log
          uv pip install --force-reinstall git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467 2>&1 | tee -a install.log

      - name: Start Reachy Mini Lite daemon
        run: |
          echo "Starting Reachy Mini Lite daemon..."
          source .venv/bin/activate
          uv run reachy-mini-daemon --robot-name reachy_mini_lite --serialport auto --localhost-only > daemon.log 2>&1 &
          echo $! > lite_daemon.pid
          echo "Daemon PID: $(cat lite_daemon.pid)"

      - name: Wait for Lite daemon to be running
        run: |
          echo "Waiting for Lite daemon to start..."
          for i in {1..60}; do
            STATUS=$(curl -s http://localhost:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Lite daemon is now running!"
              exit 0
            fi
            sleep 5
          done
          echo "[ERROR] Lite daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Lite daemon
        if: always()
        run: |
          echo "Stopping Lite daemon..."
          curl -X POST "http://localhost:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon via API"
          sleep 2
          if [ -f lite_daemon.pid ]; then
            kill $(cat lite_daemon.pid) 2>/dev/null || echo "Daemon already stopped"
            rm lite_daemon.pid
          fi

      - name: Write step summary
        if: always()
        run: |
          {
            echo ""
            echo "<details><summary>Install log</summary>"
            echo ""
            echo '```'
            cat install.log 2>/dev/null || echo "(no install log)"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>Daemon log</summary>"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup virtual environment
        if: always()
        run: rm -rf .venv

  mac_wireless:
    needs: [linux_wireless, windows_wireless, mac_lite]
    if: ${{ always() && needs.windows_wireless.result == 'success' }}
    runs-on: ci-runner-mac
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Start Reachy Mini Wireless daemon
        run: |
          echo "Starting Reachy Mini Wireless daemon..."
          curl -X POST "http://reachy-mini-ci.local:8000/api/daemon/start?wake_up=true" || echo "Daemon may already be running"

      - name: Wait for Wireless daemon to be running
        run: |
          echo "Waiting for Wireless daemon to start..."
          for i in {1..60}; do
            STATUS=$(curl -s http://reachy-mini-ci.local:8000/api/daemon/status | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: Daemon status is '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "[OK] Wireless daemon is now running!"
              exit 0
            fi
            sleep 5
          done
          echo "[ERROR] Wireless daemon failed to start after 300s"
          exit 1

      - name: Stop Reachy Mini Wireless daemon
        if: always()
        run: |
          echo "Stopping Wireless daemon..."
          curl -X POST "http://reachy-mini-ci.local:8000/api/daemon/stop?goto_sleep=true" || echo "Failed to stop daemon"

      - name: Fetch daemon logs via WebSocket
        if: always()
        run: |
          sleep 5
          python3.12 -m venv /tmp/ws-venv
          /tmp/ws-venv/bin/pip install --quiet websockets
          /tmp/ws-venv/bin/python - > daemon.log <<'PYEOF'
          import asyncio, websockets
          async def main():
              uri = "ws://reachy-mini-ci.local:8000/logs/ws/daemon"
              print(f"[CI] Connecting to {uri}", flush=True)
              try:
                  async with websockets.connect(uri, open_timeout=30, ping_interval=None) as ws:
                      print("[CI] WS connected, reading messages...", flush=True)
                      while True:
                          try:
                              msg = await asyncio.wait_for(ws.recv(), timeout=3.0)
                              if msg.strip():
                                  print(msg, flush=True)
                          except asyncio.TimeoutError:
                              break
                          except websockets.exceptions.ConnectionClosed:
                              break
              except Exception as e:
                  print(f"[CI] Failed to fetch logs: {type(e).__name__}: {e}", flush=True)
          asyncio.run(main())
          PYEOF
          echo "Fetched $(wc -l < daemon.log) lines"
          rm -rf /tmp/ws-venv

      - name: Write step summary
        if: always()
        run: |
          {
            echo ""
            echo "<details><summary>Daemon log</summary>"
            echo ""
            echo '```'
            cat daemon.log 2>/dev/null || echo "(no daemon log)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
