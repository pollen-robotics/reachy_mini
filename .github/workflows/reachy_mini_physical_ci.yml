          python -m pip install --force-reinstall "git+https://github.com/pollen-robotics/reachy_mini.git@10de4b99a96d706ac421809fd9402f2eeb02d467" 2>&1 | Tee-Object -FilePath install.log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Start Reachy Mini Wireless daemon
        shell: powershell
        run: |
          Write-Host "Starting Reachy Mini Wireless daemon..."
          curl.exe -X POST "http://reachy-mini-ci.local:8000/api/daemon/start?wake_up=true"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Daemon may already be running"
          }

      - name: Wait for Wireless daemon to be running
        shell: powershell
        run: |
          Write-Host "Waiting for Wireless daemon to start..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://reachy-mini-ci.local:8000/api/daemon/status" -Method Get
              $status = $response.state
              Write-Host "Attempt $i : Daemon status is '$status'"
              if ($status -eq "running") {
                Write-Host "[OK] Wireless daemon is now running!"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i : Failed to get status"
            }
            Start-Sleep -Seconds 5
          }
          Write-Host "[ERROR] Wireless daemon failed to start after 60 seconds"
          exit 1

      - name: Stop Reachy Mini Wireless daemon
        if: always()
        shell: powershell
        run: |
          Write-Host "Stopping Wireless daemon..."
          curl.exe -X POST "http://reachy-mini-ci.local:8000/api/daemon/stop?goto_sleep=true"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Failed to stop daemon"
          }
          $global:LASTEXITCODE = 0

      - name: Write step summary
        if: always()
        shell: powershell
        run: |
          $check = [char]0x2713
          $cross = [char]0x2717
          $status = if ('${{ job.status }}' -eq 'success') { $check } else { $cross }
          $p = $env:GITHUB_STEP_SUMMARY
          "" | Add-Content -Path $p -Encoding utf8
          "<details><summary>windows_wireless $status</summary>" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "**Install log**" | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          '```' | Add-Content -Path $p -Encoding utf8
          if (Test-Path install.log) { Get-Content install.log | Add-Content -Path $p -Encoding utf8 } else { "(no install log)" | Add-Content -Path $p -Encoding utf8 }
          '```' | Add-Content -Path $p -Encoding utf8
          "" | Add-Content -Path $p -Encoding utf8
          "</details>" | Add-Content -Path $p -Encoding utf8

      - name: Cleanup virtual environment
        if: always()
        shell: powershell
        run: Remove-Item -Recurse -Force .venv -ErrorAction SilentlyContinue

  windows_sim:
    needs: windows_wireless
    if: always()
    runs-on: ci-runner-windows
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cleanup any existing daemon process
